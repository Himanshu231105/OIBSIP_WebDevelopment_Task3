<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperature Converter</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial;
  background: linear-gradient(to right, #4facfe, #00f2fe);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  background: white;
  padding: 30px;
  width: 350px;
  border-radius: 12px;
  text-align: center;
}

h1 {
  margin-bottom: 20px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 10px;
  background: #0f172a;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #1e293b;
}

#result {
  margin-top: 15px;
  font-size: 16px;
}

.extra {
  margin-top: 20px;
}

.row {
  display: flex;
  justify-content: space-between;
}

.box {
  width: 30%;
  background: #f1f5f9;
  padding: 10px;
  border-radius: 6px;
}

.history {
  margin-top: 20px;
  text-align: left;
  max-height: 100px;
  overflow-y: auto;
}

.history p {
  font-size: 14px;
  margin-bottom: 5px;
}

.clear-btn {
  margin-top: 10px;
  background: red;
}

.stats {
  display: flex;
  justify-content: space-around;
  margin-top: 15px;
}

.stat {
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<h1>Temp Converter</h1>

<input type="number" id="temp" placeholder="Enter value">

<select id="unit">
  <option value="c">Celsius</option>
  <option value="f">Fahrenheit</option>
  <option value="k">Kelvin</option>
</select>

<button onclick="convert()">Convert</button>

<div id="result"></div>

<div class="extra">
  <div class="row">
    <div class="box" id="cBox">C: -</div>
    <div class="box" id="fBox">F: -</div>
    <div class="box" id="kBox">K: -</div>
  </div>
</div>

<div class="stats">
  <div class="stat">Conversions: <span id="count">0</span></div>
  <div class="stat">Last: <span id="last">-</span></div>
</div>

<div class="history" id="history"></div>

<button class="clear-btn" onclick="clearHistory()">Clear History</button>

</div>

<script>
let count = 0;

function convert() {
  let t = parseFloat(document.getElementById("temp").value);
  let u = document.getElementById("unit").value;

  if(isNaN(t)) {
    document.getElementById("result").innerHTML = "Enter valid number";
    return;
  }

  let c, f, k;

  if(u === "c") {
    c = t;
    f = (t * 9/5) + 32;
    k = t + 273.15;
  }
  else if(u === "f") {
    f = t;
    c = (t - 32) * 5/9;
    k = c + 273.15;
  }
  else {
    k = t;
    c = t - 273.15;
    f = (c * 9/5) + 32;
  }

  document.getElementById("cBox").innerHTML = "C: " + c.toFixed(2);
  document.getElementById("fBox").innerHTML = "F: " + f.toFixed(2);
  document.getElementById("kBox").innerHTML = "K: " + k.toFixed(2);

  document.getElementById("result").innerHTML =
    "Celsius: " + c.toFixed(2) + "<br>" +
    "Fahrenheit: " + f.toFixed(2) + "<br>" +
    "Kelvin: " + k.toFixed(2);

  count++;
  document.getElementById("count").innerText = count;

  let lastText = t + " (" + u.toUpperCase() + ")";
  document.getElementById("last").innerText = lastText;

  let history = document.getElementById("history");
  let entry = document.createElement("p");
  entry.innerText = lastText + " → C:" + c.toFixed(1) + " F:" + f.toFixed(1) + " K:" + k.toFixed(1);
  history.prepend(entry);
}

function clearHistory() {
  document.getElementById("history").innerHTML = "";
  document.getElementById("count").innerText = "0";
}
</script>

</body>
</html>
